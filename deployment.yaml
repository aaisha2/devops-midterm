apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
spec:
  replicas: 2   # Use 2 pods for redundancy
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers:
      - name: student-app
        image: aaisha112/student-app:v1   # Use your Docker Hub image
        ports:
        - containerPort: 5000
        readinessProbe:                 # Ensure pod is ready before sending traffic
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:                  # Restarts pod if it becomes unhealthy
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: student-app-service
spec:
  selector:
    app: student-app
  ports:
  - port: 80         # External port
    targetPort: 5000 # Container port
  type: LoadBalancer